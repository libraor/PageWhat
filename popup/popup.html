<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup-container">
      <!-- Header -->
      <div class="header">
        <div class="header-left">
          <span class="logo">🔍</span>
          <span class="title">PageWhat</span>
        </div>
        <a href="https://github.com/libraor/PageWhat" target="_blank" rel="noopener noreferrer" class="github-link" title="GitHub">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
          </svg>
        </a>
      </div>

      <!-- Status Bar -->
      <div class="status-bar">
        <span class="status-item">
          <span class="status-dot active"></span>
          <span id="active-count">0</span> 个活跃
        </span>
        <span class="status-item">
          <span class="status-dot unread"></span>
          <span id="unread-count">0</span> 条未读
        </span>
      </div>

      <!-- Quick Actions -->
      <div class="quick-actions">
        <button id="btn-monitor-current" class="btn-monitor-current">📌 监控当前页面</button>
      </div>

      <!-- Bulk Actions -->
      <div class="bulk-actions" id="bulk-actions">
        <button id="btn-resume-all" class="btn-bulk-action">一键开启</button>
        <button id="btn-pause-all" class="btn-bulk-action danger">一键停止</button>
      </div>


      <!-- Footer -->
      <div class="footer">
        <button id="btn-dashboard" class="btn-link">打开管理面板 →</button>
      </div>
    </div>

    <script src="popup.js" type="module"></script>
  </body>
</html>
