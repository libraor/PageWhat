<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup-container">
      <!-- Header -->
      <div class="header">
        <div class="header-left">
          <span class="logo">🔍</span>
          <span class="title">PageWhat</span>
        </div>
        <button id="btn-settings" class="icon-btn" title="设置">⚙️</button>
      </div>

      <!-- Status Bar -->
      <div class="status-bar">
        <span class="status-item">
          <span class="status-dot active"></span>
          <span id="active-count">0</span> 个活跃
        </span>
        <span class="status-item">
          <span class="status-dot unread"></span>
          <span id="unread-count">0</span> 条未读
        </span>
      </div>

      <!-- Bulk Actions -->
      <div class="bulk-actions" id="bulk-actions">
        <button id="btn-resume-all" class="btn-bulk-action">一键开启</button>
        <button id="btn-pause-all" class="btn-bulk-action danger">一键停止</button>
      </div>

      <!-- Add Monitor Form -->
      <div class="add-form" id="add-form">
        <div class="form-header" id="form-toggle">
          <span>+ 添加监控</span>
          <span class="toggle-icon" id="toggle-icon">▼</span>
        </div>
        <div class="form-body" id="form-body">
          <div class="form-group">
            <label>任务名称（可选）</label>
            <input type="text" id="input-name" placeholder="可选，默认使用域名" />
          </div>
          <div class="form-group">
            <label>URL</label>
            <input type="url" id="input-url" placeholder="https://example.com" />
          </div>
          <div class="form-group">
            <label>监控类型</label>
            <select id="input-type">
              <option value="text">文本变化</option>
              <option value="structure">结构变化</option>
              <option value="keyword">关键词出现</option>
            </select>
          </div>
          <div class="form-group hidden" id="keywords-group">
            <label>关键词（逗号分隔）</label>
            <input type="text" id="input-keywords" placeholder="降价,缺货" />
          </div>
          <div class="form-group">
            <label>检查间隔</label>
            <select id="input-interval">
              <option value="1">1 分钟</option>
              <option value="5" selected>5 分钟</option>
              <option value="15">15 分钟</option>
              <option value="30">30 分钟</option>
              <option value="60">1 小时</option>
            </select>
          </div>
          <button id="btn-add" class="btn-primary">开始监控</button>
        </div>
      </div>

      <!-- Footer -->
      <div class="footer">
        <button id="btn-dashboard" class="btn-link">打开管理面板 →</button>
      </div>
    </div>

    <script src="popup.js" type="module"></script>
  </body>
</html>
